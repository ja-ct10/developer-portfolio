<svg xmlns="http://www.w3.org/2000/svg" width="600" height="700" viewBox="0 0 600 700">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2A1040"/>
      <stop offset="100%" stop-color="#1E0031"/>
    </linearGradient>
    <linearGradient id="silhouette-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C3B1FF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#C3B1FF" stop-opacity="0.6"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="600" height="700" rx="24" ry="24" fill="url(#bg-grad)"/>
  <!-- Decorative circles -->
  <circle cx="480" cy="120" r="80" fill="#C3B1FF" opacity="0.05"/>
  <circle cx="100" cy="600" r="120" fill="#C3B1FF" opacity="0.04"/>
  <!-- Person silhouette - head -->
  <circle cx="300" cy="240" r="85" fill="url(#silhouette-grad)"/>
  <!-- Person silhouette - body -->
  <ellipse cx="300" cy="480" rx="130" ry="160" fill="url(#silhouette-grad)"/>
  <!-- Initials -->
  <text x="300" y="260" font-family="sans-serif" font-size="64" font-weight="bold" fill="#1E0031" text-anchor="middle" opacity="0.7">JA</text>
  <!-- Subtle label -->
  <text x="300" y="660" font-family="sans-serif" font-size="14" fill="#C3B1FF" text-anchor="middle" opacity="0.5">Portrait Placeholder</text>
</svg>
