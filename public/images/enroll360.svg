<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="enroll-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="600" height="600" fill="url(#enroll-bg)"/>
  <!-- Dashboard mockup -->
  <!-- Top bar -->
  <rect x="100" y="140" width="400" height="320" rx="12" fill="#222222" stroke="#333333" stroke-width="1"/>
  <rect x="100" y="140" width="400" height="40" rx="12" fill="#2A2A2A"/>
  <rect x="100" y="168" width="400" height="2" fill="#333333"/>
  <!-- Window dots -->
  <circle cx="124" cy="160" r="6" fill="#FF5F56"/>
  <circle cx="144" cy="160" r="6" fill="#FFBD2E"/>
  <circle cx="164" cy="160" r="6" fill="#27CA40"/>
  <!-- Sidebar -->
  <rect x="100" y="180" width="90" height="280" fill="#1E1E1E"/>
  <!-- Sidebar items -->
  <rect x="112" y="200" width="66" height="8" rx="4" fill="#C3B1FF" opacity="0.6"/>
  <rect x="112" y="224" width="54" height="8" rx="4" fill="#444444"/>
  <rect x="112" y="248" width="60" height="8" rx="4" fill="#444444"/>
  <rect x="112" y="272" width="48" height="8" rx="4" fill="#444444"/>
  <!-- Main content area - form fields -->
  <rect x="210" y="200" width="270" height="32" rx="6" fill="#2A2A2A" stroke="#333333" stroke-width="1"/>
  <rect x="210" y="248" width="270" height="32" rx="6" fill="#2A2A2A" stroke="#333333" stroke-width="1"/>
  <rect x="210" y="296" width="130" height="32" rx="6" fill="#2A2A2A" stroke="#333333" stroke-width="1"/>
  <rect x="350" y="296" width="130" height="32" rx="6" fill="#2A2A2A" stroke="#333333" stroke-width="1"/>
  <!-- Table rows -->
  <rect x="210" y="350" width="270" height="1" fill="#333333"/>
  <rect x="210" y="360" width="180" height="8" rx="4" fill="#444444"/>
  <rect x="210" y="380" width="270" height="1" fill="#333333"/>
  <rect x="210" y="390" width="160" height="8" rx="4" fill="#444444"/>
  <rect x="210" y="410" width="270" height="1" fill="#333333"/>
  <rect x="210" y="420" width="200" height="8" rx="4" fill="#444444"/>
  <!-- Submit button -->
  <rect x="390" y="440" width="90" height="28" rx="6" fill="#C3B1FF" opacity="0.8"/>
  <!-- Project name -->
  <text x="300" y="540" font-family="sans-serif" font-size="28" font-weight="bold" fill="#C3B1FF" text-anchor="middle">Enroll360</text>
  <text x="300" y="565" font-family="sans-serif" font-size="13" fill="#666666" text-anchor="middle">School Enrollment System</text>
</svg>
