<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="ibrgy-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="600" height="600" fill="url(#ibrgy-bg)"/>
  <!-- Phone outline -->
  <rect x="200" y="100" width="200" height="400" rx="28" fill="#222222" stroke="#444444" stroke-width="2"/>
  <!-- Screen -->
  <rect x="212" y="130" width="176" height="340" rx="4" fill="#1A1A1A"/>
  <!-- Status bar -->
  <rect x="212" y="130" width="176" height="24" fill="#2A2A2A"/>
  <rect x="270" y="108" width="60" height="16" rx="8" fill="#1A1A1A"/>
  <!-- App content - header -->
  <rect x="224" y="166" width="152" height="20" rx="4" fill="#C3B1FF" opacity="0.2"/>
  <rect x="250" y="172" width="100" height="8" rx="4" fill="#C3B1FF" opacity="0.6"/>
  <!-- Cards/items -->
  <rect x="224" y="200" width="152" height="50" rx="8" fill="#2A2A2A"/>
  <rect x="236" y="212" width="80" height="8" rx="4" fill="#555555"/>
  <rect x="236" y="228" width="120" height="6" rx="3" fill="#444444"/>
  <rect x="224" y="262" width="152" height="50" rx="8" fill="#2A2A2A"/>
  <rect x="236" y="274" width="70" height="8" rx="4" fill="#555555"/>
  <rect x="236" y="290" width="110" height="6" rx="3" fill="#444444"/>
  <rect x="224" y="324" width="152" height="50" rx="8" fill="#2A2A2A"/>
  <rect x="236" y="336" width="90" height="8" rx="4" fill="#555555"/>
  <rect x="236" y="352" width="100" height="6" rx="3" fill="#444444"/>
  <!-- Bottom nav -->
  <rect x="212" y="430" width="176" height="40" fill="#2A2A2A"/>
  <circle cx="252" cy="450" r="8" fill="#444444"/>
  <circle cx="300" cy="450" r="8" fill="#C3B1FF" opacity="0.7"/>
  <circle cx="348" cy="450" r="8" fill="#444444"/>
  <!-- Home indicator -->
  <rect x="270" y="480" width="60" height="4" rx="2" fill="#444444"/>
  <!-- Project name -->
  <text x="300" y="545" font-family="sans-serif" font-size="28" font-weight="bold" fill="#C3B1FF" text-anchor="middle">iBrgy</text>
  <text x="300" y="570" font-family="sans-serif" font-size="13" fill="#666666" text-anchor="middle">Barangay Mobile App</text>
</svg>
